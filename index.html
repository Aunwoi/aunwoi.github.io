<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Access</title>

  <style>
    body{
      font-family: Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#f5f5f5;
    }

    .box{
      background:white;
      padding:30px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    input{
      padding:10px;
      width:220px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:8px;
    }

    button{
      padding:10px 20px;
      margin-top:15px;
      border:none;
      background:#0078ff;
      color:white;
      border-radius:8px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Enter Password</h2>

  <input type="password" id="pass" placeholder="Password">

  <br>

  <button onclick="checkPassword()">Enter</button>
</div>

  }

</script>

</body>
</html>
